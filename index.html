<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexPixel - Inicio</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/modales.css">
    <link rel="stylesheet" href="css/index.css">
</head>

<body>
    <!-- Botón menú hamburguesa para móvil -->
    <button class="menu-toggle" id="menuToggle" onclick="toggleSidebar()">☰</button>
    <div class="sidebar" id="sidebar"></div>

    <div class="content">
        <section class="hero">
            <h1>Bienvenido a NexPixel</h1>
            <p>La mejor tienda de videojuegos y tarjetas digitales</p>
        </section>

        <section class="carruel-section">
            <h2>🎮 Juegos recién llegados</h2>
            <div class="carrusel-container">
                <button class="carrusel-btn prev" onclick="moverCarrusel(-1)">❮</button>
                <div class="carrusel-track" id="carrusel-recientes"></div>
                <button class="carrusel-btn next" onclick="moverCarrusel(1)">❯</button>
            </div>
        </section>

        <section class="recomendaciones">
            <h2>✨ Recomendaciones para ti</h2>
            <div id="recomendaciones-container" class="productos-grid"></div>
        </section>
    </div>

    <a href="carrito.html" class="cart-floating" id="cartFloating">
        🛒
        <span class="cart-badge" id="cartCount">0</span>
    </a>


    <div class="modal-overlay" id="auth-modal"></div>
    <div class="modal-overlay" id="perfil-modal"></div>

    <!-- ✅ SCRIPTS CORRECTOS PARA NODE.JS -->
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/modales.js"></script>
    <script src="js/productos.js"></script>
    <script src="js/carrito-db.js"></script>
    <script src="js/ia-db.js"></script>
    <script src="js/compras.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
