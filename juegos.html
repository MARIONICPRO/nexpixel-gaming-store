<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juegos - NexPixel</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/modales.css">
    <link rel="stylesheet" href="css/juegos.css">
</head>
<body>
    <!-- Botón menú hamburguesa para móvil -->
    <button class="menu-toggle" id="menuToggle" onclick="toggleSidebar()">☰</button>

    <!-- Sidebar -->
    <div class="sidebar" id="sidebar"></div>

    <!-- Contenido principal -->
    <div class="content">
        <!-- Header con título y botón de filtros -->
        <div class="page-header">
            <h2>🎮 Juegos</h2>
            <button class="filter-toggle-btn" id="toggleFiltrosBtn" onclick="toggleFiltrosPanel()">
                <span>🔍</span> Filtros
                <span class="filter-icon">▼</span>
            </button>
        </div>

        <div class="juegos-container with-filters" id="juegosContainer">
            <!-- Panel de filtros (ocultable) -->
            <div class="filtros-panel" id="filtrosPanel">
                <h3>
                    Filtrar Juegos
                    <button class="close-filtros-btn" onclick="toggleFiltrosPanel()">✕</button>
                </h3>
                
                <div class="filtro-grupo">
                    <h4>Plataforma</h4>
                    <div id="filtro-plataformas"></div>
                </div>

                <div class="filtro-grupo">
                    <h4>Género</h4>
                    <div id="filtro-generos">
                        <label class="filtro-opcion">
                            <input type="checkbox" value="accion" onchange="aplicarFiltros()"> Acción
                        </label>
                        <label class="filtro-opcion">
                            <input type="checkbox" value="aventura" onchange="aplicarFiltros()"> Aventura
                        </label>
                        <label class="filtro-opcion">
                            <input type="checkbox" value="rpg" onchange="aplicarFiltros()"> RPG
                        </label>
                        <label class="filtro-opcion">
                            <input type="checkbox" value="shooter" onchange="aplicarFiltros()"> Shooter
                        </label>
                        <label class="filtro-opcion">
                            <input type="checkbox" value="deportes" onchange="aplicarFiltros()"> Deportes
                        </label>
                    </div>
                </div>

                <div class="filtro-grupo">
                    <h4>Precio máximo</h4>
                    <div class="precio-rango">
                        <input type="range" id="precio-range" min="0" max="500000" value="500000" step="10000" oninput="actualizarPrecio()" onchange="aplicarFiltros()">
                        <div class="precio-valor">
                            <span>$0</span>
                            <span id="precio-valor">$500,000</span>
                        </div>
                    </div>
                </div>

                <button class="btn-filtrar" onclick="aplicarFiltros()">Aplicar filtros</button>
            </div>

            <!-- Grid de juegos -->
            <main>
                <!-- Barra de búsqueda -->
                <div class="search-section">
                    <input type="text" class="search-input" id="searchInput" placeholder="Buscar juegos..." oninput="buscarJuegos()">
                </div>

                <div class="resultados-header">
                    <span class="resultados-count" id="resultados-count">Cargando juegos...</span>
                    <select class="ordenar-select" id="ordenar" onchange="ordenarProductos()">
                        <option value="relevancia">Relevancia</option>
                        <option value="precio-asc">Menor precio</option>
                        <option value="precio-desc">Mayor precio</option>
                        <option value="nombre">Nombre A-Z</option>
                    </select>
                </div>

                <div id="juegos-grid" class="productos-grid">
                    <div class="loading">
                        <div class="spinner"></div>
                        <p>Cargando juegos...</p>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Botón flotante carrito -->
    <a href="carrito.html" class="cart-floating" id="cartFloating">
        🛒
        <span class="cart-badge" id="cartCount">0</span>
    </a>

    <!-- Modales -->
    <div class="modal-overlay" id="auth-modal"></div>
    <div class="modal-overlay" id="perfil-modal"></div>

      <!-- ✅ SCRIPTS CORRECTOS PARA NODE.JS -->
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/modales.js"></script>
    <script src="js/productos.js"></script>
    <script src="js/carrito-db.js"></script>
    <script src="js/ia-db.js"></script>
    <script src="js/compras.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
