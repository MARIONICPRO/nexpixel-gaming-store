<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>NexPixel - Inicio</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Poppins:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/modales.css">
    <link rel="stylesheet" href="css/index.css">
</head>

<body>
    <!-- Pantalla de Bienvenida NexPixel -->
    <div id="welcome-screen" class="welcome-screen">
        <div class="welcome-particles" id="welcomeParticles"></div>

        <div class="welcome-container">
            <div class="welcome-logo">
                <h1 class="welcome-title">
                    <span class="nex">Nex</span><span class="pixel">Pixel</span>
                </h1>
                <div class="welcome-subtitle">Videojuegos Digitales</div>
            </div>

            <div class="welcome-divider">
                <span class="divider-line"></span>
                <span class="divider-icon"><i class="fas fa-gamepad"></i></span>
                <span class="divider-line"></span>
            </div>

            <div class="welcome-message">
                <p class="welcome-text">Bienvenido a la mejor tienda de videojuegos digitales</p>
                <p class="welcome-subtext">Descubre, compra y juega al instante</p>
            </div>

            <button class="welcome-btn" id="welcomeBtn" onclick="cerrarBienvenida()">
                <span class="btn-text">Presiona Start</span>
                <span class="btn-subtext">o haz clic aquí</span>
                <div class="btn-glow"></div>
            </button>

            <div class="welcome-hint">
                <p>También puedes presionar <kbd>Enter</kbd> o <kbd>Espacio</kbd></p>
            </div>
        </div>

        <div class="welcome-scanline"></div>
    </div>

    <div class="sidebar" id="sidebar"></div>

    <div class="content">
        <section class="hero">
            <div class="hero-content">
                <!-- 🔥 CAMBIO: Ruta relativa de la imagen -->
                <img src="../resources/img/Logo.png" alt="NexPixel Logo" class="hero-logo">
                <div class="hero-text">
                    <h1>
                        BIENVENIDO A
                        <span class="brand">NEXPIXEL</span>
                    </h1>
                    <p>La mejor tienda de videojuegos y tarjetas digitales</p>
                </div>
            </div>
        </section>

        <section class="carruel-section">
            <h2><i class="fa-solid fa-gamepad"></i> Juegos recién llegados</h2>
            <div class="carrusel-container">
                <button class="carrusel-btn prev" onclick="moverCarrusel(-1)"><i
                        class="fa-solid fa-chevron-left"></i></button>
                <div class="carrusel-track" id="carrusel-recientes"></div>
                <button class="carrusel-btn next" onclick="moverCarrusel(1)"><i
                        class="fa-solid fa-chevron-right"></i></button>
            </div>
        </section>

        <section class="recomendaciones-ia">
            <h2>Recomendaciones para ti</h2>
            <div id="ia-razonamiento"></div>
            <div id="recomendaciones-ia-container"></div>
        </section>
    </div>

    <!-- 🔥 CAMBIO: URL limpia -->
    <a href="/carrito" class="cart-floating" id="cartFloating">
        <i class="fa-solid fa-cart-shopping"></i>
        <span class="cart-badge" id="cartCount">0</span>
    </a>

    <div class="modal-overlay" id="auth-modal"></div>
    <div class="modal-overlay" id="perfil-modal"></div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/modales.js"></script>
    <script src="js/productos.js"></script>
    <script src="js/carrito-db.js"></script>
    <script src="js/ia-db.js"></script>
    <script src="js/compras.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
