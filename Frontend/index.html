<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=0.85, maximum-scale=0.85, user-scalable=yes">
    <title>NexPixel - Inicio</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/modales.css">
    <link rel="stylesheet" href="css/index.css">
</head>

<body>
    <!-- Botón menú hamburguesa para móvil -->
    <button class="menu-toggle" id="menuToggle" onclick="toggleSidebar()"><i class="fa-solid fa-bars"></i></button>
    <div class="sidebar" id="sidebar"></div>

    <div class="content">
        <section class="hero">
            <div class="hero-content">

                <img src="../resources/img/Logo.png" alt="NexPixel Logo" class="hero-logo">

                <div class="hero-text">
                    <h1>
                        BIENVENIDO A
                        <span class="brand">NEXPIXEL</span>
                    </h1>
                    <p>La mejor tienda de videojuegos y tarjetas digitales</p>
                </div>

            </div>
        </section>

        <section class="carruel-section">
            <h2><i class="fa-solid fa-gamepad"></i> Juegos recién llegados</h2>
            <div class="carrusel-container">
                <button class="carrusel-btn prev" onclick="moverCarrusel(-1)"><i
                        class="fa-solid fa-chevron-left"></i></button>
                <div class="carrusel-track" id="carrusel-recientes"></div>
                <button class="carrusel-btn next" onclick="moverCarrusel(1)"><i
                        class="fa-solid fa-chevron-right"></i></button>
            </div>
        </section>

        <section class="recomendaciones">
            <h2><i class="fa-solid fa-star"></i> Recomendaciones para ti</h2>
            <div id="recomendaciones-container" class="productos-grid"></div>
        </section>
    </div>

    <a href="carrito.html" class="cart-floating" id="cartFloating">
        <i class="fa-solid fa-cart-shopping"></i>
        <span class="cart-badge" id="cartCount">0</span>
    </a>


    <div class="modal-overlay" id="auth-modal"></div>
    <div class="modal-overlay" id="perfil-modal"></div>


    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/modales.js"></script>
    <script src="js/productos.js"></script>
    <script src="js/carrito-db.js"></script>
    <script src="js/ia-db.js"></script>
    <script src="js/compras.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
