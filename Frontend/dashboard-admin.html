<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Administrador - NexPixel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/modales.css">
    <link rel="stylesheet" href="css/dashboard-admin.css">
</head>

<body>
    <!-- Botón menú hamburguesa para móvil -->
    <button class="menu-toggle" id="menuToggle" onclick="toggleSidebar()">☰</button>
    
    <!-- Sidebar (se renderizará con JS) -->
    <div class="sidebar" id="sidebar"></div>

    <!-- Contenido principal -->
    <div class="content">
        <div class="dashboard-header">
            <h1>Panel de Administrador</h1>
            <div class="stats-grid" id="stats-admin"></div>
        </div>

        <div class="dashboard-tabs">
            <button class="tab-btn active" onclick="cambiarTabAdmin('usuarios')">Usuarios</button>
            <button class="tab-btn" onclick="cambiarTabAdmin('proveedores')">Proveedores</button>
            <button class="tab-btn" onclick="cambiarTabAdmin('productos')">Productos</button>
            <button class="tab-btn" onclick="cambiarTabAdmin('ventas')">Ventas</button>
            <button class="tab-btn" onclick="cambiarTabAdmin('devoluciones')">Devoluciones</button>
        </div>

        <div id="admin-content" class="dashboard-content"></div>
    </div>

    <!-- Botón flotante carrito -->
    <a href="carrito.html" class="cart-floating" id="cartFloating">
        <i class="fa-solid fa-cart-shopping"></i>
        <span class="cart-badge" id="cartCount">0</span>
    </a>

    <!-- Modales -->
    <div class="modal-overlay" id="auth-modal"></div>
    <div class="modal-overlay" id="perfil-modal"></div>

    <!-- ✅ SCRIPTS CORRECTOS PARA NODE.JS -->
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/modales.js"></script>
    <script src="js/productos.js"></script>
    <script src="js/carrito-db.js"></script>
    <script src="js/ia-db.js"></script>
    <script src="js/compras.js"></script>
    <script src="js/dashboard-admin.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
