<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Proveedor - NexPixel</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/modales.css">
    <link rel="stylesheet" href="css/dashboard-prove.css">
</head>

<body>
    <!-- Botón menú hamburguesa para móvil -->
    <button class="menu-toggle" id="menuToggle" onclick="toggleSidebar()">☰</button>
    <div class="sidebar" id="sidebar"></div>

    <div class="content">
        <!-- ✅ Wrapper principal con clase del CSS -->
        <div class="proveedor-dashboard">

            <!-- ✅ Header con clase del CSS -->
            <div class="proveedor-header">
                <h1>Panel de Proveedor</h1>
            </div>

            <!-- ✅ Stats con clase del CSS (antes era "stats-grid") -->
            <div class="proveedor-stats" id="stats-proveedor"></div>

            <!-- ✅ Tabs con clases del CSS (antes era "dashboard-tabs" y "tab-btn") -->
            <div class="proveedor-tabs">
                <button class="proveedor-tab active" onclick="cambiarTabProveedor('productos')">Mis productos</button>
                <button class="proveedor-tab" onclick="cambiarTabProveedor('nuevo')">
                    <i class="fa-solid fa-plus"></i> Añadir producto
                </button>
                <button class="proveedor-tab" onclick="cambiarTabProveedor('codigos')">Cargar códigos</button>
                <button class="proveedor-tab" onclick="cambiarTabProveedor('ventas')">Mis ventas</button>
            </div>

            <!-- Contenido dinámico -->
            <div id="proveedor-content"></div>

        </div>
    </div>

    <a href="carrito.html" class="cart-floating" id="cartFloating">
        <i class="fa-solid fa-cart-shopping"></i>
        <span class="cart-badge" id="cartCount">0</span>
    </a>

    <div class="modal-overlay" id="auth-modal"></div>
    <div class="modal-overlay" id="perfil-modal"></div>

    <!-- Scripts en orden correcto -->
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/modales.js"></script>
    <script src="js/productos.js"></script>
    <script src="js/carrito-db.js"></script>
    <script src="js/ia-db.js"></script>
    <script src="js/compras.js"></script>
    <script src="js/dashboard-prove.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
