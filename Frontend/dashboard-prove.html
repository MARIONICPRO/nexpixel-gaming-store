<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Proveedor - NexPixel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/modales.css">
    <link rel="stylesheet" href="css/dashboard-prove.css">
</head>

<body>
    <!-- Botón menú hamburguesa para móvil -->
    <button class="menu-toggle" id="menuToggle" onclick="toggleSidebar()">☰</button>
    <div class="sidebar" id="sidebar"></div>

    <div class="content">
        <div class="dashboard-header">
            <h1>Panel de Proveedor</h1>
            <div class="stats-grid" id="stats-proveedor"></div>
        </div>

        <div class="dashboard-tabs">
            <button class="tab-btn active" onclick="cambiarTabProveedor('productos')">Mis productos</button>
            <button class="tab-btn" onclick="cambiarTabProveedor('nuevo')">➕ Añadir producto</button>
            <button class="tab-btn" onclick="cambiarTabProveedor('codigos')">Cargar códigos</button>
            <button class="tab-btn" onclick="cambiarTabProveedor('ventas')">Mis ventas</button>
        </div>

        <div id="proveedor-content" class="dashboard-content"></div>
    </div>
    
    <a href="carrito.html" class="cart-floating" id="cartFloating">
         <i class="fa-solid fa-cart-shopping"></i>
        <span class="cart-badge" id="cartCount">0</span>
    </a>

    <div class="modal-overlay" id="auth-modal"></div>
    <div class="modal-overlay" id="perfil-modal"></div>

    <!-- ✅ SCRIPTS EN ORDEN CORRECTO -->
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/modales.js"></script>
    <script src="js/productos.js"></script>
    <script src="js/carrito-db.js"></script>
    <script src="js/ia-db.js"></script>
    <script src="js/compras.js"></script>
    <script src="js/dashboard-prove.js"></script>  <!-- 👈 AGREGADO -->
    <script src="js/main.js"></script>
</body>

</html>
