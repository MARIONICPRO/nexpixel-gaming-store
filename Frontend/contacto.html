<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Contacto - NexPixel</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/modales.css">
    <link rel="stylesheet" href="css/contacto.css">
</head>

<body>

    <div class="sidebar" id="sidebar"></div>

    <div class="content">
        <div class="contacto-container">
            
            <!-- ===== INFORMACIÓN DE CONTACTO ===== -->
            <div class="info-contacto">
                <h2><i class="fa-solid fa-headset"></i> Contáctanos</h2>
                <p>¿Tienes dudas o problemas? Estamos aquí para ayudarte.</p>

                <div class="metodos-contacto">
                    <div class="metodo-item">
                        <div class="metodo-icono"><i class="fa-solid fa-envelope-open-text"></i></div>
                        <div>
                            <h4>Email</h4>
                            <p>ivanclavijo97@gmail.com</p>
                        </div>
                    </div>
                    <div class="metodo-item">
                        <div class="metodo-icono"><i class="fa-brands fa-whatsapp"></i></div>
                        <div>
                            <h4>WhatsApp</h4>
                            <p>+57 321 434 1500</p>
                        </div>
                    </div>
                    <div class="metodo-item">
                        <div class="metodo-icono"><i class="fa-solid fa-comments"></i></div>
                        <div>
                            <h4>Chat</h4>
                            <p>24/7 en línea</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- ===== FORMULARIO DE CONTACTO ===== -->
            <div class="formulario-contacto">
                <h2><i class="fa-solid fa-paper-plane"></i> Enviar mensaje</h2>

                <!-- ✅ Sin onsubmit -->
                <form id="form-contacto">
                    
                    <div class="form-group">
                        <label>Nombre completo</label>
                        <input type="text" id="contacto-nombre" placeholder="Tu nombre" required>
                    </div>
                    
                    <div class="form-group" id="grupo-email">
                        <label>Correo electrónico</label>
                        <input type="email" id="contacto-email" placeholder="Tu email" required>
                    </div>

                    <div class="form-group" id="grupo-whatsapp" style="display:none;">
                        <label>Número de WhatsApp</label>
                        <input type="tel" id="contacto-whatsapp" placeholder="+57 321 434 1500">
                    </div>
                    
                    <div class="form-group">
                        <label>¿Cómo prefieres que te respondamos?</label>
                        <div class="radio-group">
                            <label class="radio-opcion">
                                <input type="radio" name="respuesta-via" value="email" checked onchange="toggleCampoContacto()">
                                <i class="fa-solid fa-envelope"></i> Correo electrónico
                            </label>
                            <label class="radio-opcion">
                                <input type="radio" name="respuesta-via" value="whatsapp" onchange="toggleCampoContacto()">
                                <i class="fa-brands fa-whatsapp"></i> WhatsApp
                            </label>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>Motivo</label>
                        <select id="contacto-tipo" required>
                            <option value="">Selecciona un motivo</option>
                            <option value="duda">❓ Duda sobre producto</option>
                            <option value="problema">⚠️ Problema con compra</option>
                            <option value="devolucion">🔄 Solicitar devolución</option>
                            <option value="proveedor">🏢 Quiero ser proveedor</option>
                            <option value="cuenta-suspendida">🚫 Cuenta suspendida o inactiva</option>
                            <option value="otro">📝 Otro</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label>Mensaje</label>
                        <textarea id="contacto-mensaje" rows="5" placeholder="Describe tu problema o consulta..." required></textarea>
                    </div>
                    
                    <!-- ✅ type="button" + onclick en lugar de type="submit" -->
                    <button type="button" class="btn-enviar" onclick="enviarMensaje()">
                        <i class="fa-solid fa-paper-plane"></i> Enviar mensaje
                    </button>
                </form>
                
                <div id="form-mensaje" style="display:none; margin-top:1rem; padding:1rem; border-radius:8px; text-align:center;"></div>
            </div>
            
        </div>
    </div>

    <a href="/carrito" class="cart-floating" id="cartFloating">
        <i class="fa-solid fa-cart-shopping"></i>
        <span class="cart-badge" id="cartCount">0</span>
    </a>

    <div class="modal-overlay" id="auth-modal"></div>
    <div class="modal-overlay" id="perfil-modal"></div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/modales.js"></script>
    <script src="js/productos.js"></script>
    <script src="js/carrito-db.js"></script>
    <script src="js/ia-db.js"></script>
    <script src="js/contacto.js"></script>
    <script src="js/compras.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
