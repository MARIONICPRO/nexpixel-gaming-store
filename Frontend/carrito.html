<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrito - NexPixel</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    
    <!-- 👇 AGREGAR ESTA LÍNEA -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/carrito.css">
    <link rel="stylesheet" href="css/modales.css">
</head>

<body class="carrito-page">
    <div class="carrito-wrapper">
        <div class="carrito-header">
            <h1>Tu Carrito de Compras</h1>
            <a href="index.html" class="btn-volver">← Seguir comprando</a>
        </div>

        <div class="carrito-container">
            <div class="carrito-productos">
                <h2>Productos seleccionados</h2>
                <div id="carrito-items" class="carrito-items"></div>
            </div>

            <div class="panel-pago">
                <h2>Proceso de pago</h2>

                <!-- Campos comunes para todos los métodos -->
                <div id="campos-comunes">
                    <div class="form-group">
                        <label>Nombre completo</label>
                        <input type="text" id="pago-nombre" placeholder="Ej: Juan Pérez" required>
                    </div>
                    <div class="form-group">
                        <label>Documento de identidad</label>
                        <input type="text" id="pago-documento" placeholder="Ej: 123456789" required>
                    </div>
                    <div class="form-group">
                        <label>Correo electrónico</label>
                        <input type="email" id="pago-email" placeholder="ejemplo@correo.com" required>
                    </div>
                </div>

                <!-- Métodos de pago -->
                <h3>Método de pago</h3>
                <div class="metodos-pago">
                    <div class="metodo-pago" data-metodo="nequi" onclick="seleccionarMetodo('nequi')">
                        <span>Nequi</span>
                    </div>
                    <div class="metodo-pago" data-metodo="daviplata" onclick="seleccionarMetodo('daviplata')">
                        <span>Daviplata</span>
                    </div>
                    <div class="metodo-pago" data-metodo="visa" onclick="seleccionarMetodo('visa')">

                        <span>Visa</span>
                    </div>
                    <div class="metodo-pago" data-metodo="efecty" onclick="seleccionarMetodo('efecty')">

                        <span>Efecty</span>
                    </div>
                </div>

                <!-- Contenedor para campos específicos según método de pago -->
                <div id="campos-especificos" class="campos-especificos"></div>

                <!-- Total y botón confirmar -->
                <div class="total-pagar">
                    <span>Total a pagar:</span>
                    <span id="total-pagar">$0</span>
                </div>

                <button class="btn-confirmar" onclick="confirmarPago()">Confirmar pago</button>
            </div>
        </div>

        <section class="recomendaciones">
            <h2><i class="fa-solid fa-star"></i> Recomendaciones para ti</h2>
            <div id="recomendaciones-container" class="productos-grid"></div>
        </section>

    </div>

    <div class="modal-overlay" id="auth-modal"></div>
    <div class="modal-overlay" id="perfil-modal"></div>

  <!-- 2. Al final del BODY, en este orden: -->
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/pagos.js"></script>
<script src="js/confirmar-pago.js"></script>
<script src="js/modales.js"></script>
<script src="js/productos.js"></script>
<script src="js/carrito-db.js"></script>
<script src="js/ia-db.js"></script>
<script src="js/compras.js"></script>
<script src="js/main.js"></script>
</body>

</html>
