<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juegos - NexPixel</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Poppins:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/modales.css">
    <link rel="stylesheet" href="css/juegos.css">
</head>

<body>
    <button class="menu-toggle" id="menuToggle" onclick="toggleSidebar()">☰</button>
    <div class="sidebar" id="sidebar"></div>

    <div class="content">
        <div class="page-header">
            <h2><i class="bi bi-controller"></i> Juegos</h2>
        </div>

        <!-- Botón para abrir modal de filtros en móvil -->
        <button class="filtros-toggle-btn" id="filtrosToggleBtn" onclick="abrirModalFiltros()">
            <i class="fa-solid fa-filter"></i> Filtros
            <span class="filter-icon">▼</span>
        </button>

        <!-- Overlay -->
        <div class="filtros-overlay" id="filtrosOverlay" onclick="cerrarModalFiltros()"></div>

        <!-- Modal de filtros para móvil -->
        <div class="filtros-modal" id="filtrosModal">
            <div class="filtros-modal-header">
                <h3>Filtrar Juegos</h3>
                <button onclick="cerrarModalFiltros()">✕</button>
            </div>
            <div class="filtros-modal-content">
                <div class="filtro-grupo">
                    <div id="filtro-plataformas-mobile"></div>
                </div>

                <div class="filtro-grupo">
                    <h4>Género</h4>
                    <div id="filtro-generos-mobile">
                        <label class="filtro-opcion">
                            <input type="checkbox" value="accion" onchange="aplicarFiltros()"> Acción
                        </label>
                        <label class="filtro-opcion">
                            <input type="checkbox" value="aventura" onchange="aplicarFiltros()"> Aventura
                        </label>
                        <label class="filtro-opcion">
                            <input type="checkbox" value="rpg" onchange="aplicarFiltros()"> RPG
                        </label>
                        <label class="filtro-opcion">
                            <input type="checkbox" value="shooter" onchange="aplicarFiltros()"> Shooter
                        </label>
                        <label class="filtro-opcion">
                            <input type="checkbox" value="deportes" onchange="aplicarFiltros()"> Deportes
                        </label>
                    </div>
                </div>

                <div class="filtro-grupo">
                    <h4>Precio máximo</h4>
                    <div class="precio-rango">
                        <input type="range" id="precio-range-mobile" min="0" max="500000" value="500000" step="10000"
                            oninput="actualizarPrecioMobile()" onchange="aplicarFiltros()">
                        <div class="precio-valor">
                            <span>$0</span>
                            <span id="precio-valor-mobile">$500,000</span>
                        </div>
                    </div>
                </div>
            </div>
            <div class="filtros-modal-footer">
                <button class="btn-cerrar-filtros" onclick="cerrarModalFiltros()">Cerrar</button>
                <button class="btn-filtrar" onclick="aplicarFiltros(); cerrarModalFiltros()">Aplicar filtros</button>
            </div>
        </div>

        <!-- Sidebar de filtros para desktop -->
        <div class="juegos-container">
            <div class="filtros-sidebar" id="filtrosSidebar">
                <h3>Filtrar Juegos</h3>

                <div class="filtro-grupo">
                    <div id="filtro-plataformas"></div>
                </div>

                <div class="filtro-grupo">
                    <h4>Género</h4>
                    <div id="filtro-generos">
                        <label class="filtro-opcion">
                            <input type="checkbox" value="accion" onchange="aplicarFiltros()"> Acción
                        </label>
                        <label class="filtro-opcion">
                            <input type="checkbox" value="aventura" onchange="aplicarFiltros()"> Aventura
                        </label>
                        <label class="filtro-opcion">
                            <input type="checkbox" value="rpg" onchange="aplicarFiltros()"> RPG
                        </label>
                        <label class="filtro-opcion">
                            <input type="checkbox" value="shooter" onchange="aplicarFiltros()"> Shooter
                        </label>
                        <label class="filtro-opcion">
                            <input type="checkbox" value="deportes" onchange="aplicarFiltros()"> Deportes
                        </label>
                    </div>
                </div>

                <div class="filtro-grupo">
                    <h4>Precio máximo</h4>
                    <div class="precio-rango">
                        <input type="range" id="precio-range" min="0" max="500000" value="500000" step="10000"
                            oninput="actualizarPrecio()" onchange="aplicarFiltros()">
                        <div class="precio-valor">
                            <span>$0</span>
                            <span id="precio-valor">$500,000</span>
                        </div>
                    </div>
                </div>

                <button class="btn-filtrar" onclick="aplicarFiltros()">Aplicar filtros</button>
            </div>

            <!-- Contenido principal -->
            <div class="filtros-contenido">
                <div class="search-section">
                    <!-- Por esto: -->
                    <input type="text" class="search-input" id="searchInput" placeholder="Buscar juegos..."
                        oninput="aplicarFiltros()">
                </div>

                <div class="resultados-header">
                    <span class="resultados-count" id="resultados-count">Cargando juegos...</span>
                    <select class="ordenar-select" id="ordenar" onchange="ordenarProductos()">
                        <option value="relevancia">Relevancia</option>
                        <option value="precio-asc">Menor precio</option>
                        <option value="precio-desc">Mayor precio</option>
                        <option value="nombre">Nombre A-Z</option>
                    </select>
                </div>

                <div id="juegos-grid" class="productos-grid">
                    <div class="loading">
                        <div class="spinner"></div>
                        <p>Cargando juegos...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <a href="carrito.html" class="cart-floating" id="cartFloating">
        <i class="fa-solid fa-cart-shopping"></i>
        <span class="cart-badge" id="cartCount">0</span>
    </a>

    <div class="modal-overlay" id="auth-modal"></div>
    <div class="modal-overlay" id="perfil-modal"></div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/modales.js"></script>
    <script src="js/productos.js"></script>
    <script src="js/carrito-db.js"></script>
    <script src="js/ia-db.js"></script>
    <script src="js/compras.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
