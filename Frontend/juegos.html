<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juegos - NexPixel</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Poppins:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/modales.css">
    <link rel="stylesheet" href="css/juegos.css">
</head>

<body>
    <!-- Sidebar global (menú principal) -->
    <button class="menu-toggle" id="menuToggle" onclick="toggleSidebar()">☰</button>
    <div class="sidebar" id="sidebar"></div>

    <div class="content">
        <div class="page-header">
            <h2><i class="fa-solid fa-gamepad"></i> Juegos</h2>
        </div>

        <!-- Botón para abrir filtros en móvil -->
        <button class="filtros-toggle-btn" id="filtrosToggleBtn" onclick="abrirModalFiltrosJuegos()">
            <i class="fa-solid fa-filter"></i> Filtrar Juegos
        </button>

        <!-- Overlay para móvil -->
        <div class="filtros-overlay" id="filtrosOverlay" onclick="cerrarModalFiltrosJuegos()"></div>

        <!-- Modal de filtros para móvil -->
        <div class="filtros-modal" id="filtrosModal">
            <div class="filtros-modal-header">
                <h3>Filtrar Juegos</h3>
                <button onclick="cerrarModalFiltrosJuegos()">✕</button>
            </div>
            <div class="filtros-modal-content">
                <div class="filtro-grupo">
                    <h4>Plataforma</h4>
                    <div id="filtro-plataformas-mobile"></div>
                </div>
                <div class="filtro-grupo">
                    <h4>Género</h4>
                    <div id="filtro-generos-mobile">
                        <label class="filtro-opcion">
                            <input type="checkbox" value="accion" onchange="aplicarFiltros()"> Acción
                        </label>
                        <label class="filtro-opcion">
                            <input type="checkbox" value="aventura" onchange="aplicarFiltros()"> Aventura
                        </label>
                        <label class="filtro-opcion">
                            <input type="checkbox" value="rpg" onchange="aplicarFiltros()"> RPG
                        </label>
                        <label class="filtro-opcion">
                            <input type="checkbox" value="shooter" onchange="aplicarFiltros()"> Shooter
                        </label>
                        <label class="filtro-opcion">
                            <input type="checkbox" value="deportes" onchange="aplicarFiltros()"> Deportes
                        </label>
                    </div>
                </div>
                <div class="filtro-grupo">
                    <h4>Precio máximo</h4>
                    <div class="precio-rango">
                        <input type="range" id="precio-range-mobile" min="0" max="500000" value="500000" step="10000" 
                               oninput="actualizarPrecioMobile()" onchange="aplicarFiltros()">
                        <div class="precio-valor">
                            <span>$0</span>
                            <span id="precio-valor-mobile">$500,000</span>
                        </div>
                    </div>
                </div>
            </div>
            <div class="filtros-modal-footer">
                <button class="btn-cerrar-filtros" onclick="cerrarModalFiltrosJuegos()">Cerrar</button>
                <button class="btn-filtrar" onclick="aplicarFiltros(); cerrarModalFiltrosJuegos()">Aplicar filtros</button>
            </div>
        </div>

        <!-- Contenedor principal: FILTROS + PRODUCTOS -->
        <div class="juegos-container">
            <!-- Sidebar de filtros (visible en desktop) -->
            <aside class="filtros-sidebar" id="filtrosSidebar">
                <h3>Filtrar Juegos</h3>
                
                <!-- Plataformas - SIN título duplicado, lo pone cargarFiltrosPlataformas -->
                <div id="filtro-plataformas"></div>

                <!-- Géneros -->
                <div class="filtro-grupo">
                    <h4>Género</h4>
                    <div id="filtro-generos">
                        <label class="filtro-opcion">
                            <input type="checkbox" value="accion" onchange="aplicarFiltros()"> Acción
                        </label>
                        <label class="filtro-opcion">
                            <input type="checkbox" value="aventura" onchange="aplicarFiltros()"> Aventura
                        </label>
                        <label class="filtro-opcion">
                            <input type="checkbox" value="rpg" onchange="aplicarFiltros()"> RPG
                        </label>
                        <label class="filtro-opcion">
                            <input type="checkbox" value="shooter" onchange="aplicarFiltros()"> Shooter
                        </label>
                        <label class="filtro-opcion">
                            <input type="checkbox" value="deportes" onchange="aplicarFiltros()"> Deportes
                        </label>
                    </div>
                </div>

                <!-- Rango de precio -->
                <div class="filtro-grupo">
                    <h4>Precio máximo</h4>
                    <div class="precio-rango">
                        <input type="range" id="precio-range" min="0" max="500000" value="500000" step="10000"
                            oninput="actualizarPrecio()" onchange="aplicarFiltros()">
                        <div class="precio-valor">
                            <span>$0</span>
                            <span id="precio-valor">$500,000</span>
                        </div>
                    </div>
                </div>

                <button class="btn-filtrar" onclick="aplicarFiltros()">Aplicar filtros</button>
            </aside>

            <!-- Contenido principal (productos) -->
            <main class="filtros-contenido">
                <div class="search-section">
                    <input type="text" class="search-input" id="searchInput" placeholder="Buscar juegos..." oninput="aplicarFiltros()">
                </div>

                <div class="resultados-header">
                    <span class="resultados-count" id="resultados-count">Cargando juegos...</span>
                    <select class="ordenar-select" id="ordenar" onchange="ordenarProductos()">
                        <option value="relevancia">Relevancia</option>
                        <option value="precio-asc">Menor precio</option>
                        <option value="precio-desc">Mayor precio</option>
                        <option value="nombre">Nombre A-Z</option>
                    </select>
                </div>

                <div id="juegos-grid" class="productos-grid">
                    <div class="loading">
                        <div class="spinner"></div>
                        <p>Cargando juegos...</p>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <a href="carrito.html" class="cart-floating" id="cartFloating">
        <i class="fa-solid fa-cart-shopping"></i>
        <span class="cart-badge" id="cartCount">0</span>
    </a>

    <div class="modal-overlay" id="auth-modal"></div>
    <div class="modal-overlay" id="perfil-modal"></div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/modales.js"></script>
    <script src="js/productos.js"></script> <!-- ← Toda la lógica está aquí -->
    <script src="js/carrito-db.js"></script>
    <script src="js/ia-db.js"></script>
    <script src="js/compras.js"></script>
    <script src="js/main.js"></script>

    <!-- Script mínimo SOLO para UI de filtros móvil -->
    <script>
        // Inicializar filtros de plataformas (ya incluye el título "Plataforma")
        if (document.getElementById('filtro-plataformas')) {
            Productos.cargarFiltrosPlataformas('filtro-plataformas', 'aplicarFiltros()');
        }

        // Funciones de modal para móvil
        function abrirModalFiltrosJuegos() {
            const modal = document.getElementById('filtrosModal');
            const overlay = document.getElementById('filtrosOverlay');
            if (modal) {
                modal.classList.add('active');
                if (overlay) overlay.classList.add('active');
                document.body.style.overflow = 'hidden';
                
                // Cargar plataformas en el modal si están vacías
                const mobileContainer = document.getElementById('filtro-plataformas-mobile');
                if (mobileContainer && mobileContainer.children.length === 0) {
                    Productos.cargarFiltrosPlataformas('filtro-plataformas-mobile', 'aplicarFiltros()');
                }
                
                // Sincronizar precio
                const rangeDesktop = document.getElementById('precio-range');
                const rangeMobile = document.getElementById('precio-range-mobile');
                if (rangeDesktop && rangeMobile) {
                    rangeMobile.value = rangeDesktop.value;
                    const valorMobile = document.getElementById('precio-valor-mobile');
                    if (valorMobile) {
                        valorMobile.textContent = '$' + parseInt(rangeDesktop.value).toLocaleString('es-CO');
                    }
                }
            }
        }
        
        function cerrarModalFiltrosJuegos() {
            const modal = document.getElementById('filtrosModal');
            const overlay = document.getElementById('filtrosOverlay');
            if (modal) {
                modal.classList.remove('active');
                if (overlay) overlay.classList.remove('active');
                document.body.style.overflow = '';
            }
        }
        
        function actualizarPrecioMobile() {
            const range = document.getElementById('precio-range-mobile');
            const valor = document.getElementById('precio-valor-mobile');
            if (range && valor) {
                valor.textContent = '$' + parseInt(range.value).toLocaleString('es-CO');
            }
            // Sincronizar con desktop
            const rangeDesktop = document.getElementById('precio-range');
            if (rangeDesktop && range) {
                rangeDesktop.value = range.value;
                const valorDesktop = document.getElementById('precio-valor');
                if (valorDesktop) {
                    valorDesktop.textContent = '$' + parseInt(range.value).toLocaleString('es-CO');
                }
            }
        }
        
        // Exponer funciones globalmente
        window.abrirModalFiltrosJuegos = abrirModalFiltrosJuegos;
        window.cerrarModalFiltrosJuegos = cerrarModalFiltrosJuegos;
        window.actualizarPrecioMobile = actualizarPrecioMobile;
    </script>
</body>
</html>
