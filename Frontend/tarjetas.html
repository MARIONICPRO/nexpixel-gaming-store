<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Tarjetas - NexPixel</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/modales.css">
    <link rel="stylesheet" href="css/tarjetas.css">
</head>
<body>
    <!-- Sidebar global (menú principal) -->
    <button class="menu-toggle" id="menuToggle" onclick="toggleSidebar()">☰</button>
    <div class="sidebar" id="sidebar"></div>

    <div class="content">
        <div class="page-header">
            <h2><i class="fas fa-credit-card"></i> Tarjetas Digitales</h2>
        </div>

        <!-- Botón para abrir filtros en móvil -->
        <button class="filtros-toggle-btn" id="filtrosToggleBtn" onclick="abrirModalFiltrosTarjetas()">
            <i class="fa-solid fa-filter"></i> Filtrar Tarjetas
        </button>

        <!-- Overlay para móvil -->
        <div class="filtros-overlay" id="filtrosOverlay" onclick="cerrarModalFiltrosTarjetas()"></div>

        <!-- Modal de filtros para móvil -->
        <div class="filtros-modal" id="filtrosModal">
            <div class="filtros-modal-header">
                <h3>Filtrar Tarjetas</h3>
                <button onclick="cerrarModalFiltrosTarjetas()">✕</button>
            </div>
            <div class="filtros-modal-content">
                <div class="filtro-grupo">
                    <h4>Plataforma</h4>
                    <div id="filtro-plataformas-tarjetas-mobile"></div>
                </div>
                <div class="filtro-grupo">
                    <h4>Precio máximo</h4>
                    <div class="precio-rango">
                        <input type="range" id="precio-range-tarjetas-mobile" min="0" max="500000" value="500000" step="10000" 
                               oninput="actualizarPrecioTarjetasMobile()" onchange="aplicarFiltrosTarjetas()">
                        <div class="precio-valor">
                            <span>$0</span>
                            <span id="precio-valor-tarjetas-mobile">$500,000</span>
                        </div>
                    </div>
                </div>
            </div>
            <div class="filtros-modal-footer">
                <button class="btn-cerrar-filtros" onclick="cerrarModalFiltrosTarjetas()">Cerrar</button>
                <button class="btn-filtrar" onclick="aplicarFiltrosTarjetas(); cerrarModalFiltrosTarjetas()">Aplicar filtros</button>
            </div>
        </div>

        <!-- Contenedor principal: FILTROS + PRODUCTOS -->
        <div class="tarjetas-container">
            <!-- Sidebar de filtros (visible en desktop) -->
            <aside class="filtros-sidebar" id="filtrosSidebar">
                <h3>Filtrar Tarjetas</h3>
                
                <div class="filtro-grupo">
                    
                    <div id="filtro-plataformas-tarjetas"></div>
                </div>

                <div class="filtro-grupo">
                    <h4>Precio máximo</h4>
                    <div class="precio-rango">
                        <input type="range" id="precio-range-tarjetas" min="0" max="500000" value="500000" step="10000" 
                               oninput="actualizarPrecioTarjetas()" onchange="aplicarFiltrosTarjetas()">
                        <div class="precio-valor">
                            <span>$0</span>
                            <span id="precio-valor-tarjetas">$500,000</span>
                        </div>
                    </div>
                </div>

                <button class="btn-filtrar" onclick="aplicarFiltrosTarjetas()">Aplicar filtros</button>
            </aside>

            <!-- Contenido principal (productos) -->
            <main class="filtros-contenido">
                <div class="search-section">
                    <input type="text" class="search-input" id="searchInputTarjetas" placeholder="Buscar tarjetas..." oninput="buscarTarjetas()">
                </div>

                <div class="resultados-header">
                    <span class="resultados-count" id="resultados-count-tarjetas">Cargando tarjetas...</span>
                    <select class="ordenar-select" id="ordenar-tarjetas" onchange="ordenarTarjetas()">
                        <option value="relevancia">Relevancia</option>
                        <option value="precio-asc">Menor precio</option>
                        <option value="precio-desc">Mayor precio</option>
                        <option value="nombre">Nombre A-Z</option>
                    </select>
                </div>

                <div id="tarjetas-grid" class="tarjetas-grid">
                    <div class="loading">
                        <div class="spinner"></div>
                        <p>Cargando tarjetas...</p>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <a href="carrito.html" class="cart-floating" id="cartFloating">
        <i class="fa-solid fa-cart-shopping"></i>
        <span class="cart-badge" id="cartCount">0</span>
    </a>

    <div class="modal-overlay" id="auth-modal"></div>
    <div class="modal-overlay" id="perfil-modal"></div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/sidebar.js"></script>
    <script src="js/modales.js"></script>
    <script src="js/productos.js"></script> <!-- ← Aquí está toda la lógica -->
    <script src="js/carrito-db.js"></script>
    <script src="js/ia-db.js"></script>
    <script src="js/compras.js"></script>
    <script src="js/main.js"></script>

    <!-- Script mínimo SOLO para inicializar los filtros de tarjetas -->
    <script>
        // Inicializar filtros de plataformas para tarjetas
        if (document.getElementById('filtro-plataformas-tarjetas')) {
            Productos.cargarFiltrosPlataformas('filtro-plataformas-tarjetas', 'aplicarFiltrosTarjetas()');
        }

        // Funciones de modal (solo para la UI)
        function abrirModalFiltrosTarjetas() {
            const modal = document.getElementById('filtrosModal');
            const overlay = document.getElementById('filtrosOverlay');
            if (modal) {
                modal.classList.add('active');
                if (overlay) overlay.classList.add('active');
                document.body.style.overflow = 'hidden';
                
                // Cargar filtros en el modal si están vacíos
                if (document.getElementById('filtro-plataformas-tarjetas-mobile')?.children.length === 0) {
                    Productos.cargarFiltrosPlataformas('filtro-plataformas-tarjetas-mobile', 'aplicarFiltrosTarjetas()');
                }
                
                // Sincronizar precio
                const rangeDesktop = document.getElementById('precio-range-tarjetas');
                const rangeMobile = document.getElementById('precio-range-tarjetas-mobile');
                if (rangeDesktop && rangeMobile) {
                    rangeMobile.value = rangeDesktop.value;
                    const valorMobile = document.getElementById('precio-valor-tarjetas-mobile');
                    if (valorMobile) {
                        valorMobile.textContent = '$' + parseInt(rangeDesktop.value).toLocaleString('es-CO');
                    }
                }
            }
        }
        
        function cerrarModalFiltrosTarjetas() {
            const modal = document.getElementById('filtrosModal');
            const overlay = document.getElementById('filtrosOverlay');
            if (modal) {
                modal.classList.remove('active');
                if (overlay) overlay.classList.remove('active');
                document.body.style.overflow = '';
            }
        }
        
        function actualizarPrecioTarjetasMobile() {
            const range = document.getElementById('precio-range-tarjetas-mobile');
            const valor = document.getElementById('precio-valor-tarjetas-mobile');
            if (range && valor) {
                valor.textContent = '$' + parseInt(range.value).toLocaleString('es-CO');
            }
            // También actualizar el desktop para sincronizar
            const rangeDesktop = document.getElementById('precio-range-tarjetas');
            if (rangeDesktop && range) {
                rangeDesktop.value = range.value;
                const valorDesktop = document.getElementById('precio-valor-tarjetas');
                if (valorDesktop) {
                    valorDesktop.textContent = '$' + parseInt(range.value).toLocaleString('es-CO');
                }
            }
        }
        
        // Exponer funciones globalmente
        window.abrirModalFiltrosTarjetas = abrirModalFiltrosTarjetas;
        window.cerrarModalFiltrosTarjetas = cerrarModalFiltrosTarjetas;
        window.actualizarPrecioTarjetasMobile = actualizarPrecioTarjetasMobile;
    </script>
</body>
</html>
